<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一字茶 · Yat Ji Cha</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --paper: #f5ede0;
    --amber: #c8853a;
    --amber-dark: #8b5a1a;
    --amber-glow: rgba(200,133,58,0.15);
    --tea: #6b3d1e;
    --mist: rgba(245,237,224,0.06);
    --gold: #d4a547;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--ink);
    color: var(--paper);
    font-family: 'IM Fell English', serif;
    overflow: hidden;
  }

  /* Rain canvas */
  canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.55;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: overlay;
  }

  /* Ambient glow center */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(200,133,58,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* Window frame — subtle */
  .window-frame {
    position: fixed;
    inset: 0;
    border: 1px solid rgba(200,133,58,0.08);
    margin: 24px;
    pointer-events: none;
    z-index: 2;
  }
  .window-frame::before, .window-frame::after {
    content: '';
    position: absolute;
    background: var(--amber);
    opacity: 0.2;
  }
  .window-frame::before { top: 0; left: 50%; width: 1px; height: 100%; }
  .window-frame::after  { left: 0; top: 50%; height: 1px; width: 100%; }

  /* Corner marks */
  .corner {
    position: fixed;
    width: 18px; height: 18px;
    border-color: rgba(200,133,58,0.35);
    border-style: solid;
    z-index: 3;
  }
  .corner.tl { top: 24px; left: 24px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 24px; right: 24px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 24px; left: 24px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 24px; right: 24px; border-width: 0 1px 1px 0; }

  /* Main layout */
  .scene {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 60px 24px;
  }

  /* Title block */
  .title-block {
    text-align: center;
    margin-bottom: 52px;
    animation: rise 1.8s cubic-bezier(0.16,1,0.3,1) both;
  }

  .title-chinese {
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: clamp(2.8rem, 7vw, 5rem);
    letter-spacing: 0.25em;
    color: var(--amber);
    filter: drop-shadow(0 0 28px rgba(200,133,58,0.4));
    line-height: 1;
    display: block;
  }

  .title-pinyin {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    color: rgba(245,237,224,0.3);
    margin-top: 10px;
    display: block;
  }

  .title-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    margin: 14px auto;
    opacity: 0.5;
  }

  .title-tagline {
    font-size: 0.7rem;
    letter-spacing: 0.45em;
    color: rgba(245,237,224,0.2);
    text-transform: uppercase;
  }

  /* Prompt text */
  .prompt-text {
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 2.5vw, 1.15rem);
    color: rgba(245,237,224,0.45);
    letter-spacing: 0.2em;
    text-align: center;
    margin-bottom: 20px;
    animation: rise 1.8s cubic-bezier(0.16,1,0.3,1) 0.2s both;
  }

  /* Input area */
  .input-area {
    width: 100%;
    max-width: 360px;
    animation: rise 1.8s cubic-bezier(0.16,1,0.3,1) 0.35s both;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
    border-bottom: 1px solid rgba(200,133,58,0.35);
    transition: border-color 0.4s;
  }
  .input-wrap:focus-within {
    border-color: var(--amber);
  }
  .input-wrap:focus-within::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 100%; height: 1px;
    background: var(--amber);
    filter: blur(4px);
    opacity: 0.6;
  }

  .word-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 14px 0;
    font-family: 'Noto Serif TC', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--paper);
    letter-spacing: 0.12em;
    text-align: center;
    caret-color: var(--amber);
  }
  .word-input::placeholder {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1rem;
    color: rgba(245,237,224,0.18);
    letter-spacing: 0.2em;
  }

  .submit-btn {
    background: none;
    border: none;
    color: rgba(200,133,58,0.5);
    font-size: 1rem;
    cursor: pointer;
    padding: 14px 4px 14px 12px;
    transition: color 0.3s, transform 0.3s;
    font-family: 'IM Fell English', serif;
    letter-spacing: 0.1em;
  }
  .submit-btn:hover {
    color: var(--amber);
    transform: translateX(3px);
  }

  .input-hint {
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: rgba(245,237,224,0.15);
    margin-top: 10px;
    text-transform: uppercase;
  }

  /* Response */
  .response-area {
    width: 100%;
    max-width: 400px;
    margin-top: 48px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .response-word-zh {
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--amber);
    letter-spacing: 0.2em;
    filter: drop-shadow(0 0 16px rgba(200,133,58,0.45));
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    margin-bottom: 20px;
  }

  .response-text {
    font-family: 'IM Fell English', serif;
    font-size: clamp(0.88rem, 2vw, 1rem);
    line-height: 1.9;
    color: rgba(245,237,224,0.7);
    letter-spacing: 0.04em;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
    font-style: italic;
    max-width: 340px;
  }

  .response-proverb {
    margin-top: 18px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.75rem;
    color: rgba(200,133,58,0.45);
    letter-spacing: 0.2em;
    opacity: 0;
    transition: opacity 0.8s ease 0.6s;
    font-style: normal;
  }

  .response-area.visible .response-word-zh,
  .response-area.visible .response-text,
  .response-area.visible .response-proverb {
    opacity: 1;
    transform: translateY(0);
  }

  /* Reset link */
  .reset-btn {
    display: none;
    margin-top: 32px;
    background: none;
    border: none;
    color: rgba(245,237,224,0.2);
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    cursor: pointer;
    transition: color 0.3s;
    text-decoration: none;
  }
  .reset-btn:hover { color: rgba(245,237,224,0.5); }
  .reset-btn.show { display: block; }

  /* Loading dots */
  .loading {
    display: none;
    gap: 6px;
    align-items: center;
    justify-content: center;
    margin-top: 32px;
    height: 30px;
  }
  .loading.show { display: flex; }
  .loading span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--amber);
    opacity: 0.3;
    animation: pulse 1.2s infinite;
  }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 0.9; transform: scale(1.2); }
  }

  /* Steam animation */
  .steam {
    position: fixed;
    bottom: 60px;
    right: 60px;
    opacity: 0.12;
    pointer-events: none;
    z-index: 2;
  }
  .steam-line {
    width: 2px;
    height: 30px;
    background: linear-gradient(to top, var(--amber), transparent);
    border-radius: 2px;
    display: inline-block;
    margin: 0 3px;
    animation: steamrise 2.5s ease-in-out infinite;
    transform-origin: bottom;
  }
  .steam-line:nth-child(2) { animation-delay: 0.5s; height: 22px; }
  .steam-line:nth-child(3) { animation-delay: 1s; height: 28px; }

  @keyframes steamrise {
    0% { transform: scaleY(0) translateY(0); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: scaleY(1) translateY(-20px); opacity: 0; }
  }

  /* Teacup icon SVG */
  .teacup {
    position: fixed;
    bottom: 50px;
    right: 52px;
    z-index: 2;
    opacity: 0.1;
    pointer-events: none;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Scrolling HK characters on side */
  .side-chars {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    writing-mode: vertical-rl;
    color: rgba(200,133,58,0.08);
    pointer-events: none;
    z-index: 2;
    line-height: 1;
  }
  .side-chars.left { left: 40px; }
  .side-chars.right { right: 40px; direction: ltr; }

  /* Error */
  .error-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: rgba(180,80,60,0.7);
    text-align: center;
    margin-top: 12px;
    display: none;
    letter-spacing: 0.1em;
  }
  .error-text.show { display: block; }
</style>
</head>
<body>

<!-- Rain -->
<canvas id="rain"></canvas>

<!-- Decorative corners & frame -->
<div class="window-frame"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Side characters -->
<div class="side-chars left">香港之夜・雨聲・茶香</div>
<div class="side-chars right">一字一世界・萬語皆有情</div>

<!-- Teacup & steam -->
<div class="teacup">
  <svg width="48" height="40" viewBox="0 0 48 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 16 Q8 34 24 34 Q40 34 42 16 Z" stroke="#c8853a" stroke-width="1.5" fill="none"/>
    <path d="M42 20 Q50 20 50 26 Q50 32 42 30" stroke="#c8853a" stroke-width="1.5" fill="none"/>
    <line x1="4" y1="16" x2="44" y2="16" stroke="#c8853a" stroke-width="1.5"/>
    <line x1="2" y1="38" x2="46" y2="38" stroke="#c8853a" stroke-width="1"/>
  </svg>
</div>
<div class="steam">
  <span class="steam-line"></span>
  <span class="steam-line"></span>
  <span class="steam-line"></span>
</div>

<!-- Main scene -->
<div class="scene">

  <div class="title-block">
    <span class="title-chinese">一字茶</span>
    <span class="title-pinyin">Yat Ji Cha</span>
    <div class="title-divider"></div>
    <span class="title-tagline">One word · One cup · One truth</span>
  </div>

  <p class="prompt-text" id="promptText">今日你感覺點？</p>

  <div class="input-area" id="inputArea">
    <div class="input-wrap">
      <input
        type="text"
        class="word-input"
        id="wordInput"
        placeholder="一個字..."
        maxlength="20"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="submit-btn" id="submitBtn" title="送出">→</button>
    </div>
    <p class="input-hint">Press Enter · 按 Enter</p>
    <p class="error-text" id="errorText">一個字就夠了。</p>
  </div>

  <div class="loading" id="loading">
    <span></span><span></span><span></span>
  </div>

  <div class="response-area" id="responseArea">
    <div class="response-word-zh" id="responseZh"></div>
    <p class="response-text" id="responseText"></p>
    <p class="response-proverb" id="responseProverb"></p>
  </div>

  <button class="reset-btn" id="resetBtn">— 再飲一杯 —</button>

</div>

<script>
// ── Rain ──────────────────────────────────────────────
const canvas = document.getElementById('rain');
const ctx = canvas.getContext('2d');
let drops = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function initDrops() {
  drops = [];
  const count = Math.floor(window.innerWidth / 10);
  for (let i = 0; i < count; i++) {
    drops.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      len: Math.random() * 18 + 8,
      speed: Math.random() * 1.2 + 0.4,
      opacity: Math.random() * 0.35 + 0.05
    });
  }
}
initDrops();

function drawRain() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drops.forEach(d => {
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x - 1, d.y + d.len);
    ctx.strokeStyle = `rgba(200,180,150,${d.opacity})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
    d.y += d.speed;
    if (d.y > canvas.height) {
      d.y = -d.len;
      d.x = Math.random() * canvas.width;
    }
  });
  requestAnimationFrame(drawRain);
}
drawRain();

// ── Logic ──────────────────────────────────────────────
const wordInput   = document.getElementById('wordInput');
const submitBtn   = document.getElementById('submitBtn');
const loading     = document.getElementById('loading');
const responseArea= document.getElementById('responseArea');
const responseZh  = document.getElementById('responseZh');
const responseText= document.getElementById('responseText');
const responseProverb = document.getElementById('responseProverb');
const resetBtn    = document.getElementById('resetBtn');
const errorText   = document.getElementById('errorText');
const promptText  = document.getElementById('promptText');
const inputArea   = document.getElementById('inputArea');

function countWords(str) {
  return str.trim().split(/\s+/).filter(Boolean).length;
}

async function handleSubmit() {
  const word = wordInput.value.trim();
  if (!word) return;

  // Validate: one word only
  if (countWords(word) > 1) {
    errorText.classList.add('show');
    wordInput.focus();
    return;
  }
  errorText.classList.remove('show');

  // Hide input, show loading
  inputArea.style.opacity = '0';
  inputArea.style.pointerEvents = 'none';
  promptText.style.opacity = '0';
  loading.classList.add('show');
  responseArea.classList.remove('visible');

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `You are the Old Man — owner of an ancient tea house in Sheung Wan, Hong Kong. You have lived long, seen everything, and speak little. But every word you say carries weight and meaning.

When a user gives you one word, respond in this exact format:

HANZI: [Write the user's word concept in Chinese characters — traditional Cantonese/Mandarin]
RESPONSE: [3 short, warm, wise sentences in English. Evoke the feeling of a rainy night tea house in old Hong Kong. Never preach.]
PROVERB: [One short Cantonese proverb or HK saying in Chinese characters + brief English translation in parentheses]

Use exactly this format, nothing else outside it.`,
        messages: [{ role: "user", content: word }]
      })
    });

    const data = await response.json();
    const raw = data.content?.[0]?.text || '';

    // Parse response
    const hanziMatch   = raw.match(/HANZI:\s*(.+)/);
    const responsMatch = raw.match(/RESPONSE:\s*([\s\S]+?)(?=PROVERB:|$)/);
    const proverbMatch = raw.match(/PROVERB:\s*(.+)/);

    const hanzi   = hanziMatch   ? hanziMatch[1].trim()   : word;
    const resp    = responsMatch ? responsMatch[1].trim()  : '';
    const proverb = proverbMatch ? proverbMatch[1].trim()  : '';

    loading.classList.remove('show');

    responseZh.textContent = hanzi;
    responseText.textContent = resp;
    responseProverb.textContent = proverb;

    // Animate in
    setTimeout(() => {
      responseArea.classList.add('visible');
      resetBtn.classList.add('show');
    }, 100);

  } catch (err) {
    loading.classList.remove('show');
    responseZh.textContent = '…';
    responseText.textContent = 'The night wind has unsettled my thoughts. Please, try once more.';
    responseProverb.textContent = '';
    setTimeout(() => {
      responseArea.classList.add('visible');
      resetBtn.classList.add('show');
    }, 100);
  }
}

submitBtn.addEventListener('click', handleSubmit);
wordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSubmit();
  errorText.classList.remove('show');
});

resetBtn.addEventListener('click', () => {
  responseArea.classList.remove('visible');
  resetBtn.classList.remove('show');
  wordInput.value = '';
  setTimeout(() => {
    inputArea.style.opacity = '1';
    inputArea.style.pointerEvents = 'auto';
    promptText.style.opacity = '1';
    wordInput.focus();
  }, 400);
});

// Auto focus
setTimeout(() => wordInput.focus(), 800);
</script>
</body>
</html>
