<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yatjizha – Zodiac & Fortune</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html { scroll-behavior: smooth; }
</style>
</head>

<body class="bg-gray-50 text-gray-800">

<!-- ================= HEADER ================= -->
<header class="bg-white shadow sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
    <h1 class="text-xl font-bold text-red-600">🐉 yatjizha</h1>
    <nav class="space-x-4 text-sm">
      <a href="#zodiac">Zodiac</a>
      <a href="#fortune">Fortune</a>
    </nav>
  </div>
</header>

<!-- ================= HERO ================= -->
<section class="bg-gradient-to-br from-red-600 to-red-800 text-white py-20 text-center">
  <h2 class="text-4xl font-bold mb-4">Discover Your Fate</h2>
  <p class="opacity-90">Ancient wisdom meets modern curiosity</p>
</section>

<!-- ================= ZODIAC ================= -->
<section id="zodiac" class="py-16 max-w-5xl mx-auto px-4">
  <h2 class="text-2xl font-bold mb-6 text-center">🌟 Western Zodiac</h2>
  
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-white p-4 rounded shadow text-center">♈ Aries</div>
    <div class="bg-white p-4 rounded shadow text-center">♉ Taurus</div>
    <div class="bg-white p-4 rounded shadow text-center">♊ Gemini</div>
    <div class="bg-white p-4 rounded shadow text-center">♋ Cancer</div>
    <div class="bg-white p-4 rounded shadow text-center">♌ Leo</div>
    <div class="bg-white p-4 rounded shadow text-center">♍ Virgo</div>
    <div class="bg-white p-4 rounded shadow text-center">♎ Libra</div>
    <div class="bg-white p-4 rounded shadow text-center">♏ Scorpio</div>
  </div>
</section>

<!-- ================= DAILY FORTUNE ================= -->
<section id="fortune" class="py-16 bg-black text-white">
  <div class="max-w-xl mx-auto text-center px-4">

    <h2 class="text-3xl font-bold mb-4">🔮 Daily Fortune</h2>
    <p class="text-gray-400 mb-8">Ancient whispers. Your fate today.</p>

    <input type="date" id="date" class="mb-4 px-4 py-2 text-black rounded">

    <select id="mode" class="mb-4 px-4 py-2 text-black rounded">
      <option value="oldman">Old Man HK</option>
      <option value="ghost">Ghost</option>
      <option value="monk">Monk</option>
    </select>

    <br>

    <button onclick="generate()" 
      class="px-6 py-3 bg-red-600 rounded hover:bg-red-700">
      Reveal My Fate
    </button>

    <div id="result" class="mt-6 text-lg hidden"></div>

    <button id="shareBtn"
      class="mt-4 px-4 py-2 border hidden">
      Share to X
    </button>

  </div>
</section>

<!-- ================= SCRIPT ================= -->
<script>
const data = {
  oldman: [
    "Heaven does not speak. But you feel it when luck turns.",
    "If you chase luck, it hides.",
    "Gold comes to the patient.",
    "Someone remembers your name tonight."
  ],
  ghost: [
    "Your luck is borrowed.",
    "A forgotten choice returns.",
    "Not all smiles are alive.",
    "The shadow behind you moves."
  ],
  monk: [
    "Silence answers everything.",
    "Desire creates suffering.",
    "Walk slower.",
    "You are distracted, not lost."
  ]
};

function seed(str){
  let h=0;
  for(let i=0;i<str.length;i++){
    h=str.charCodeAt(i)+((h<<5)-h);
  }
  return Math.abs(h);
}

function generate(){
  let date=document.getElementById("date").value;
  let mode=document.getElementById("mode").value;

  if(!date){
    date=new Date().toISOString().split("T")[0];
  }

  let s=seed(date+mode);
  let list=data[mode];
  let text=list[s%list.length];

  let res=document.getElementById("result");
  res.innerText="";
  res.classList.remove("hidden");

  let i=0;
  function type(){
    if(i<text.length){
      res.innerText+=text[i];
      i++;
      setTimeout(type,25);
    }
  }
  type();

  let share=document.getElementById("shareBtn");
  share.classList.remove("hidden");
  share.onclick=()=>{
    let url="https://twitter.com/intent/tweet?text="+encodeURIComponent("🔮 "+text+" #yatjizha");
    window.open(url);
  };
}
</script>

</body>
</html>
