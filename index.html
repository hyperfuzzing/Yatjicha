<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一字茶 · Yat Ji Cha</title>

<style>
:root{
  --bg:#0a0907;
  --text:#eae7df;
  --dim:#8a7a62;
  --accent:#c8843a;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}

/* opening */
.opening{
  position:fixed;inset:0;
  background:#0a0907;
  display:flex;align-items:center;justify-content:center;
  z-index:999;
  animation:fadeOut 3s ease 2.5s forwards;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}
.opening-inner{text-align:center;color:var(--accent)}
.opening-text{font-size:1rem;opacity:.7}
.opening-sub{font-size:.7rem;opacity:.4;margin-top:6px}

/* rain */
canvas{
  position:fixed;inset:0;
  opacity:.2;pointer-events:none;
}

/* app */
.app{
  position:relative;z-index:2;
  width:100%;max-width:420px;
  text-align:center;padding:20px;
}

.title{
  font-size:3rem;
  letter-spacing:.2em;
  color:var(--accent);
}
.sub{
  font-size:.7rem;
  letter-spacing:.3em;
  color:var(--dim);
  margin-bottom:25px;
}

/* select */
select{
  background:none;
  border:1px solid var(--dim);
  color:var(--dim);
  padding:8px;
  margin-bottom:15px;
}

/* input */
.input{
  width:100%;
  border:none;
  border-bottom:1px solid var(--dim);
  background:none;
  color:var(--text);
  font-size:1.5rem;
  text-align:center;
  padding:12px;
  outline:none;
}

.hint{
  font-size:.65rem;
  color:var(--dim);
  margin-top:6px;
}

/* button */
.btn{
  margin-top:18px;
  border:1px solid var(--dim);
  padding:12px;
  background:none;
  color:var(--dim);
  cursor:pointer;
}
.btn:hover{
  color:var(--text);
  border-color:var(--accent);
}
.btn:disabled{
  opacity:.5;
  cursor:not-allowed;
}

/* status */
.status{
  margin-top:15px;
  font-size:.7rem;
  color:var(--dim);
  opacity:0;
  transition:.3s;
}
.status.show{opacity:1}

/* response */
.response{
  margin-top:35px;
  opacity:0;
  transform:translateY(10px);
  transition:.7s;
}
.response.show{opacity:1;transform:none}

.hanzi{
  font-size:2.5rem;
  color:var(--accent);
  margin-bottom:18px;
}
.text{
  font-style:italic;
  line-height:1.8;
  margin-bottom:18px;
}
.proverb{color:var(--accent)}
.meaning{
  font-size:.8rem;
  color:var(--dim);
}

/* actions */
.actions{
  display:none;
  margin-top:20px;
  flex-direction:column;
  gap:10px;
}
.actions.show{display:flex}

/* breathing */
body{
  animation:breath 8s ease-in-out infinite;
}
@keyframes breath{
  0%,100%{filter:brightness(1)}
  50%{filter:brightness(1.08)}
}
</style>
</head>

<body>

<div class="opening">
  <div class="opening-inner">
    <div class="opening-text">Sheung Wan · midnight</div>
    <div class="opening-sub">雨落 · 燈未熄</div>
  </div>
</div>

<canvas id="rain"></canvas>

<audio id="rainSound" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b47d2.mp3">
</audio>

<div class="app">

<div class="title">一字茶</div>
<div class="sub">ONE WORD · ONE TRUTH</div>

<select id="character">
  <option value="oldman">Old Man</option>
  <option value="oldwoman">Old Woman</option>
  <option value="ghost">Ghost</option>
  <option value="monk">Monk</option>
</select>

<input id="input" class="input" placeholder="one word">
<div class="hint">one word only</div>

<button id="btn" class="btn" onclick="submitWord()">ask the tea</button>

<div id="status" class="status"></div>

<div id="response" class="response">
  <div id="hanzi" class="hanzi"></div>
  <div id="text" class="text"></div>
  <div id="proverb" class="proverb"></div>
  <div id="meaning" class="meaning"></div>
</div>

<div id="actions" class="actions">
  <button class="btn" onclick="reset()">another cup</button>
  <button class="btn" onclick="share()">share</button>
</div>

</div>

<script>
/* rain */
const canvas=document.getElementById('rain');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;

let drops=[];
for(let i=0;i<60;i++){
  drops.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,len:15,speed:1});
}

function drawRain(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drops.forEach(d=>{
    ctx.beginPath();
    ctx.moveTo(d.x,d.y);
    ctx.lineTo(d.x-2,d.y+d.len);
    ctx.strokeStyle="rgba(200,175,140,0.2)";
    ctx.stroke();
    d.y+=d.speed;
    d.x-=0.2;
    if(d.y>canvas.height){d.y=0;d.x=Math.random()*canvas.width;}
  });
  requestAnimationFrame(drawRain);
}
drawRain();

/* sound */
document.addEventListener('click',()=>{
  rainSound.volume=0.25;
  rainSound.play().catch(()=>{});
},{once:true});

/* prompts */
function getPrompt(type){
  if(type==="ghost") return "You are a ghost. quiet, poetic, 3 sentences.";
  if(type==="monk") return "You are a zen monk. minimal and calm.";
  if(type==="oldwoman") return "You are a warm tea lady.";
  return "You are an old Hong Kong tea man.";
}

/* submit */
async function submitWord(){
  const btn=document.getElementById('btn');
  if(btn.disabled) return;

  const word=input.value.trim();
  if(!word) return;

  const status=document.getElementById('status');

  btn.disabled=true;
  btn.innerText="...";
  
  const states=[
    "he is listening...",
    "pouring tea...",
    "the cup is warm..."
  ];
  status.innerText=states[Math.floor(Math.random()*states.length)];
  status.classList.add('show');

  await new Promise(r=>setTimeout(r,800+Math.random()*400));

  let raw="";
  try{
    const res=await fetch("/api/tea",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        word,
        system:getPrompt(character.value)
      })
    });
    const data=await res.json();
    raw=data.text||"";
  }catch(e){}

  hanzi.innerText=raw.match(/HANZI:\s*(.+)/)?.[1]||word;
  text.innerText=raw.match(/RESPONSE:\s*([\s\S]+?)PROVERB:/)?.[1]||"...";
  proverb.innerText=raw.match(/PROVERB:\s*(.+)/)?.[1]||"";
  meaning.innerText=raw.match(/MEANING:\s*(.+)/)?.[1]||"";

  status.innerText="served";
  setTimeout(()=>status.classList.remove('show'),1200);

  response.classList.add('show');
  actions.classList.add('show');

  btn.disabled=false;
  btn.innerText="ask the tea";
}

/* reset */
function reset(){
  input.value="";
  response.classList.remove('show');
  actions.classList.remove('show');
}

/* share */
function share(){
  let tweet=`${hanzi.innerText}

${text.innerText.split('.')[0]}.

「${proverb.innerText}」

he only answers once.

— Yat Ji Cha`;

  if(tweet.length>260) tweet=tweet.slice(0,257)+"…";

  window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(tweet));
}
</script>

</body>
</html>
