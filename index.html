<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>yatjizha 命理館</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0b0b0b; color:#e5e5e5; }
.fade-in { animation: fadeIn .6s ease; }
@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px)}
  to {opacity:1; transform:translateY(0)}
}
.card:hover { transform: translateY(-5px); transition:.3s;}
</style>
</head>

<body>

<!-- HERO -->
<section class="text-center py-20">
<h1 class="text-2xl tracking-widest">yatjizha 命理館</h1>
<p class="text-gray-500 mt-2">Symbolic Identity System</p>
</section>

<!-- RITUAL -->
<section class="text-center py-16">
<input type="date" id="birth-date" class="text-black p-2 rounded">

<div class="mt-6">
<button onclick="generateReading()" class="px-6 py-3 border border-white/20 rounded-full">
開始解讀
</button>
</div>

<div id="loading" class="mt-6 text-gray-500"></div>

<div id="result-box" class="hidden mt-10 fade-in max-w-xl mx-auto">
<h3 class="text-xl mb-3">你的能量結構</h3>
<p id="reading"></p>

<div class="mt-6">
<button onclick="saveProfile()" class="border px-4 py-2 mr-2">保存</button>
<button onclick="shareCard()" class="border px-4 py-2">分享</button>
</div>
</div>
</section>

<!-- SHARE CARD -->
<div id="share-card" class="hidden text-center mt-10 p-6 border border-white/10 max-w-sm mx-auto">
<h3 class="text-lg mb-2">Energy Profile</h3>
<p id="card-text" class="text-gray-400"></p>
</div>

<!-- BADGE (dipindah bawah & kecil) -->
<footer class="text-center py-10 text-gray-600">
<a href="https://orynth.dev/projects/yatzicha" target="_blank">
<img src="https://orynth.dev/api/badge/yatzicha?theme=light&style=default" width="140" class="mx-auto opacity-70">
</a>
</footer>

<script>
// ===== ZODIAC CALC =====
function getZodiac(month, day){
if((month==3&&day>=21)||(month==4&&day<=19)) return "白羊座";
if((month==4&&day>=20)||(month==5&&day<=20)) return "金牛座";
if((month==5&&day>=21)||(month==6&&day<=21)) return "雙子座";
if((month==6&&day>=22)||(month==7&&day<=22)) return "巨蟹座";
if((month==7&&day>=23)||(month==8&&day<=22)) return "獅子座";
if((month==8&&day>=23)||(month==9&&day<=22)) return "處女座";
if((month==9&&day>=23)||(month==10&&day<=23)) return "天秤座";
if((month==10&&day>=24)||(month==11&&day<=22)) return "天蠍座";
if((month==11&&day>=23)||(month==12&&day<=21)) return "人馬座";
if((month==12&&day>=22)||(month==1&&day<=19)) return "山羊座";
if((month==1&&day>=20)||(month==2&&day<=18)) return "水瓶座";
return "雙魚座";
}

// ===== AI STYLE READING (deterministic) =====
function generateReading(){
const input=document.getElementById("birth-date").value;
if(!input) return;

const d=new Date(input);
const m=d.getMonth()+1;
const day=d.getDate();

const zodiac=getZodiac(m,day);

// deterministic "AI"
const seed=m*day;
const types=["流動型","穩定型","分裂型","轉換型"];
const traits=["直覺強","理性高","情緒敏感","結構清晰"];

const type=types[seed%types.length];
const trait=traits[(seed+3)%traits.length];

const text=`你屬於${zodiac}，能量結構為「${type}」。
你嘅特質傾向於${trait}，顯示你喺現實與內在之間持續調整。
當前階段，你正進入一個轉化周期。`;

document.getElementById("loading").innerText="解析中...";
setTimeout(()=>{
document.getElementById("loading").innerText="";
document.getElementById("result-box").classList.remove("hidden");
document.getElementById("reading").innerText=text;
window.currentProfile=text;
},1500);
}

// ===== SAVE =====
function saveProfile(){
localStorage.setItem("yatjizha_profile", window.currentProfile);
alert("已保存");
}

// ===== SHARE =====
function shareCard(){
const card=document.getElementById("share-card");
card.classList.remove("hidden");
document.getElementById("card-text").innerText=window.currentProfile;

navigator.clipboard.writeText(window.currentProfile);
}
</script>

</body>
</html>
