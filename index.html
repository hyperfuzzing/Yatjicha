<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yatjizha 命理館</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* ===== BACKGROUND ===== */
body {
  margin:0;
  color:#e5e5e5;
  background:
    radial-gradient(circle at 20% 20%, #ffcc66, transparent 40%),
    radial-gradient(circle at 80% 50%, #a855f7, transparent 40%),
    radial-gradient(circle at 50% 80%, #ff4d4d, transparent 40%),
    #0b0b0b;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background: radial-gradient(circle, rgba(255,200,100,0.08), transparent 60%);
  animation: rotate 20s linear infinite;
}
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== PARTICLES ===== */
.particle{
  position:fixed;
  width:6px;
  height:6px;
  background:rgba(255,200,100,0.7);
  border-radius:50%;
  animation: floatUp linear infinite;
}
@keyframes floatUp{
  from{transform:translateY(100vh); opacity:0;}
  50%{opacity:1;}
  to{transform:translateY(-10vh); opacity:0;}
}

/* ===== UI ===== */
.section{ border-top:1px solid rgba(255,255,255,0.08); }
.fade-in{ animation:fade .8s ease; }
@keyframes fade{ from{opacity:0} to{opacity:1} }

/* ===== CARD STYLE ===== */
canvas{
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,200,100,0.2);
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="sticky top-0 backdrop-blur border-b border-white/10">
<div class="max-w-6xl mx-auto flex justify-between p-4 text-sm text-gray-400">
<div>yatjizha 命理館</div>
<nav class="space-x-4">
<a href="#about">關於</a>
<a href="#how">使用方式</a>
<a href="#whitepaper">白皮書</a>
<a href="#team">團隊</a>
</nav>
</div>
</header>

<!-- HERO -->
<section class="text-center py-20">
<h1 class="text-2xl tracking-widest">Symbolic Identity System</h1>
<p class="text-gray-400 mt-2">你的數碼命盤正在生成</p>
</section>

<!-- INPUT -->
<section class="text-center py-16">
<input type="date" id="birth-date" class="text-black p-2 rounded">

<div class="mt-6">
<button onclick="generateReading()" class="px-6 py-3 border border-white/20 rounded-full">
開始解讀
</button>
</div>

<div id="loading" class="mt-6 text-gray-400"></div>

<div id="result-box" class="hidden mt-10 fade-in max-w-xl mx-auto">
<pre id="reading" class="text-left whitespace-pre-wrap"></pre>

<div class="mt-6 space-x-2">
<button onclick="generateCard()" class="border px-4 py-2">生成卡片</button>
<button onclick="downloadCard()" class="border px-4 py-2">下載</button>
</div>
</div>
</section>

<!-- CANVAS -->
<div class="flex justify-center mt-10">
<canvas id="cardCanvas" width="420" height="640" class="hidden"></canvas>
</div>

<!-- ABOUT -->
<section id="about" class="section py-20 text-center max-w-3xl mx-auto">
<h2 class="text-2xl mb-4">關於</h2>
<p class="text-gray-400">yatjizha 是一種數碼身份系統，將時間轉化為象徵。</p>
</section>

<!-- HOW -->
<section id="how" class="section py-20 text-center">
<h2 class="text-2xl mb-6">使用方式</h2>
<p class="text-gray-400">輸入日期 → 解讀 → 生成身份卡</p>
</section>

<!-- WHITEPAPER -->
<section id="whitepaper" class="section py-20 text-center max-w-3xl mx-auto">
<h2 class="text-2xl mb-4">白皮書</h2>
<p class="text-gray-400">系統將命理轉換為可視化身份。</p>
</section>

<!-- TEAM -->
<section id="team" class="section py-20 text-center">
<h2 class="text-2xl mb-6">團隊</h2>
<p class="text-gray-400">Yan Zing · Li Chen · Wong Kai</p>
</section>

<script>

/* ===== PARTICLES ===== */
for(let i=0;i<40;i++){
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(6+Math.random()*6)+"s";
  document.body.appendChild(p);
}

/* ===== ZODIAC ===== */
function getZodiac(m,d){
if((m==3&&d>=21)||(m==4&&d<=19)) return "白羊座";
if((m==4&&d>=20)||(m==5&&d<=20)) return "金牛座";
if((m==5&&d>=21)||(m==6&&d<=21)) return "雙子座";
if((m==6&&d>=22)||(m==7&&d<=22)) return "巨蟹座";
if((m==7&&d>=23)||(m==8&&d<=22)) return "獅子座";
if((m==8&&d>=23)||(m==9&&d<=22)) return "處女座";
if((m==9&&d>=23)||(m==10&&d<=23)) return "天秤座";
if((m==10&&d>=24)||(m==11&&d<=22)) return "天蠍座";
if((m==11&&d>=23)||(m==12&&d<=21)) return "人馬座";
if((m==12&&d>=22)||(m==1&&d<=19)) return "山羊座";
if((m==1&&d>=20)||(m==2&&d<=18)) return "水瓶座";
return "雙魚座";
}

/* ===== AI ===== */
function generateReading(){
const val=document.getElementById("birth-date").value;
if(!val) return;

const d=new Date(val);
const y=d.getFullYear();
const m=d.getMonth()+1;
const day=d.getDate();

const seed=y+m*31+day*17;

const names=["Echo Pattern","Silent Axis","Fractured Flow","Hidden Core","Dual Mirror"];
const types=["流動型","結構型","分裂型","轉換型","潛伏型"];
const phases=["啟動期","重組期","擴張期","停滯期","轉化期"];

const name=names[seed%5];
const type=types[(seed+2)%5];
const phase=phases[(seed+4)%5];
const zodiac=getZodiac(m,day);

const text=`識別名稱：${name}

星座：${zodiac}
能量類型：${type}

當前狀態：
${phase}`;

loading.innerText="解析中...";
setTimeout(()=>{
loading.innerText="";
result-box.classList.remove("hidden");
reading.innerText=text;
window.identity={name,type,phase,zodiac};
},1200);
}

/* ===== CARD ===== */
function generateCard(){
const c=document.getElementById("cardCanvas");
const ctx=c.getContext("2d");

c.classList.remove("hidden");

/* gradient bg */
const g=ctx.createLinearGradient(0,0,400,600);
g.addColorStop(0,"#ffcc66");
g.addColorStop(1,"#a855f7");

ctx.fillStyle=g;
ctx.fillRect(0,0,420,640);

/* overlay dark */
ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,0,420,640);

/* glow circle */
ctx.beginPath();
ctx.arc(210,200,100,0,Math.PI*2);
ctx.fillStyle="rgba(255,200,100,0.2)";
ctx.fill();

/* text */
ctx.fillStyle="#fff";
ctx.font="18px monospace";
ctx.fillText("YATJIZHA",150,50);

ctx.font="16px monospace";
ctx.fillText(window.identity.name,110,120);

ctx.fillText(window.identity.zodiac,150,180);
ctx.fillText(window.identity.type,130,220);

ctx.fillText("Phase:",170,300);
ctx.fillText(window.identity.phase,140,330);

/* border */
ctx.strokeStyle="rgba(255,255,255,0.2)";
ctx.strokeRect(20,20,380,600);
}

/* ===== DOWNLOAD ===== */
function downloadCard(){
const c=document.getElementById("cardCanvas");
const link=document.createElement("a");
link.download="yatjizha-card.png";
link.href=c.toDataURL();
link.click();
}

</script>

</body>
</html>
