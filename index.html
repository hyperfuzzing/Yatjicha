<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一字茶 · Cinematic</title>

<style>
:root{
  --bg:#0a0907;
  --text:#eae7df;
  --dim:#8a7a62;
  --accent:#c8843a;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}

/* OPENING */
.opening{
  position:fixed;
  inset:0;
  background:#0a0907;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  animation:fadeOut 3.5s ease 3s forwards;
}
.opening-inner{text-align:center;color:var(--accent)}
.opening-text{font-size:1rem;opacity:.7;margin-bottom:10px}
.opening-sub{font-size:.7rem;opacity:.4}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden}
}

/* RAIN */
canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.2;
}

/* APP */
.app{
  position:relative;
  z-index:2;
  width:100%;
  max-width:420px;
  text-align:center;
  padding:20px;
}

.title{
  font-size:3rem;
  letter-spacing:.2em;
  color:var(--accent);
}

.sub{
  font-size:.7rem;
  letter-spacing:.3em;
  color:var(--dim);
  margin-bottom:30px;
}

/* SELECT */
select{
  background:none;
  border:1px solid var(--dim);
  color:var(--dim);
  padding:8px;
  margin-bottom:20px;
}

/* INPUT */
.input{
  width:100%;
  border:none;
  border-bottom:1px solid var(--dim);
  background:none;
  color:var(--text);
  font-size:1.5rem;
  text-align:center;
  padding:12px;
  outline:none;
}

.btn{
  margin-top:20px;
  border:1px solid var(--dim);
  padding:12px;
  background:none;
  color:var(--dim);
  cursor:pointer;
}
.btn:hover{
  color:var(--text);
  border-color:var(--accent);
}

/* RESPONSE */
.response{
  margin-top:40px;
  opacity:0;
  transform:translateY(10px);
  transition:.8s;
}
.response.show{opacity:1;transform:none}

.hanzi{
  font-size:2.5rem;
  color:var(--accent);
  margin-bottom:20px;
}

.text{
  font-style:italic;
  line-height:1.8;
  margin-bottom:20px;
}

.proverb{
  color:var(--accent);
}

.meaning{
  font-size:.8rem;
  color:var(--dim);
}

/* ACTION */
.actions{
  display:none;
  margin-top:20px;
  gap:10px;
  flex-direction:column;
}
.actions.show{display:flex}

/* subtle breathing */
body{
  animation:breath 8s ease-in-out infinite;
}
@keyframes breath{
  0%,100%{filter:brightness(1)}
  50%{filter:brightness(1.08)}
}
</style>
</head>

<body>

<!-- OPENING -->
<div class="opening">
  <div class="opening-inner">
    <div class="opening-text">Sheung Wan · past midnight</div>
    <div class="opening-sub">雨落 · 燈未熄</div>
  </div>
</div>

<canvas id="rain"></canvas>

<audio id="rainSound" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b47d2.mp3">
</audio>

<div class="app">

<div class="title">一字茶</div>
<div class="sub">ONE WORD · ONE TRUTH</div>

<select id="character">
  <option value="oldman">Old Man</option>
  <option value="oldwoman">Old Woman</option>
  <option value="ghost">Ghost</option>
  <option value="monk">Monk</option>
</select>

<input id="input" class="input" placeholder="one word">
<button class="btn" onclick="submitWord()">brew</button>

<div id="response" class="response">
  <div id="hanzi" class="hanzi"></div>
  <div id="text" class="text"></div>
  <div id="proverb" class="proverb"></div>
  <div id="meaning" class="meaning"></div>
</div>

<div id="actions" class="actions">
  <button class="btn" onclick="reset()">another cup</button>
  <button class="btn" onclick="share()">share</button>
</div>

</div>

<script>
/* RAIN */
const canvas=document.getElementById('rain');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;

let drops=[];
for(let i=0;i<60;i++){
  drops.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    len:Math.random()*15,
    speed:Math.random()*1+0.3
  });
}

function drawRain(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drops.forEach(d=>{
    ctx.beginPath();
    ctx.moveTo(d.x,d.y);
    ctx.lineTo(d.x-2,d.y+d.len);
    ctx.strokeStyle="rgba(200,175,140,0.2)";
    ctx.stroke();
    d.y+=d.speed;
    d.x-=0.2;
    if(d.y>canvas.height){
      d.y=0;
      d.x=Math.random()*canvas.width;
    }
  });
  requestAnimationFrame(drawRain);
}
drawRain();

/* SOUND */
document.addEventListener('click',()=>{
  const audio=document.getElementById('rainSound');
  audio.volume=0.25;
  audio.play().catch(()=>{});
},{once:true});

/* PROMPTS */
function getPrompt(type){
  if(type==="ghost") return "You are a quiet ghost. Speak gently. 3 sentences only.";
  if(type==="monk") return "You are a zen monk. Calm, detached. 3 sentences only.";
  if(type==="oldwoman") return "You are an old tea lady. Warm and observant.";
  return "You are an old man in Hong Kong tea house. Speak softly.";
}

/* SUBMIT */
async function submitWord(){
  const word=document.getElementById('input').value.trim();
  const char=document.getElementById('character').value;
  if(!word) return;

  await new Promise(r=>setTimeout(r,1800+Math.random()*1200));

  let raw="";
  try{
    const res=await fetch("/api/tea",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        word,
        system:getPrompt(char)
      })
    });
    const data=await res.json();
    raw=data.text||"";
  }catch(e){}

  const h=raw.match(/HANZI:\s*(.+)/);
  const t=raw.match(/RESPONSE:\s*([\s\S]+?)PROVERB:/);
  const p=raw.match(/PROVERB:\s*(.+)/);
  const m=raw.match(/MEANING:\s*(.+)/);

  hanzi.innerText=h?.[1]||word;
  text.innerText=t?.[1]||"...";
  proverb.innerText=p?.[1]||"";
  meaning.innerText=m?.[1]||"";

  response.classList.add('show');
  actions.classList.add('show');
}

/* RESET */
function reset(){
  input.value="";
  response.classList.remove('show');
  actions.classList.remove('show');
}

/* SHARE VIRAL */
function share(){
  let tweet=`${hanzi.innerText}

${text.innerText.split('.')[0]}.

「${proverb.innerText}」

he only answers once.

— Yat Ji Cha`;

  if(tweet.length>260) tweet=tweet.slice(0,257)+"…";

  window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(tweet));
}
</script>

</body>
</html>
